<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BỘ ĐÀM / THẺ TỪ</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(
    135deg,
    #eef7f1 0%,
    #f7fafc 100%
  );
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:20px;
  padding-top:25px; 
}

.card{
  width:100%;
  max-width:540px;
  background:white;
  border-radius:28px;
  padding:28px;
  box-shadow:
    0 25px 50px rgba(0,0,0,.08),
    0 10px 20px rgba(0,0,0,.05);
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
height:6px;
background:
linear-gradient(
90deg,
#1a7f4b,
#2ecc71
);
}

h2{
text-align:center;
font-size:30px;
font-weight:800;
color:#1a7f4b;
margin-bottom:8px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#718096;
margin-bottom:24px;
}

.label{
margin-top:20px;
margin-bottom:12px;
font-size:13px;
font-weight:800;
letter-spacing:1px;
color:#c0392b;
}

.group{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.btn{
min-width:110px;
padding:14px 20px;
border-radius:999px;
background:#f8fafc;
border:2px solid #e2e8f0;
font-size:15px;
font-weight:700;
text-align:center;
cursor:pointer;
transition:.25s;
user-select:none;
}

.btn:hover{
transform:translateY(-2px);
border-color:#1a7f4b;
}

.btn:active{
transform:scale(.96);
}

.selected{
background:
linear-gradient(
135deg,
#1a7f4b,
#27ae60
);
color:white;
border-color:#1a7f4b;
box-shadow:
0 10px 20px rgba(26,127,75,.25);
}

#so-container{
margin-top:6px;
}

select{
width:100%;
padding:15px;
border-radius:18px;
border:2px solid #e2e8f0;
background:white;
font-size:15px;
outline:none;
transition:.2s;
}

select:focus{
border-color:#1a7f4b;
box-shadow:
0 0 0 4px rgba(26,127,75,.12);
}

.submit{
width:100%;
margin-top:28px;
padding:18px;
border:none;
border-radius:18px;
background:
linear-gradient(
135deg,
#1a7f4b,
#27ae60
);
color:white;
font-size:17px;
font-weight:800;
letter-spacing:1px;
cursor:pointer;
transition:.25s;
box-shadow:
0 12px 25px rgba(26,127,75,.25);
}

.submit:hover{
transform:translateY(-2px);
}

.submit:active{
transform:scale(.98);
}

#status{
margin-top:18px;
text-align:center;
font-size:15px;
font-weight:700;
min-height:22px;
}

.success{
color:#16a34a;
}

.error{
color:#dc2626;
}

</style>
</head>

<body>

<div class="card">

<h2>
📻 BỘ ĐÀM / THẺ TỪ
</h2>

<div class="label">THIẾT BỊ</div>

<div class="group" id="thietbi-group">

<div class="btn" onclick="chon('thietbi','BỘ ĐÀM',this)">
BỘ ĐÀM
</div>

<div class="btn" onclick="chon('thietbi','THẺ TỪ',this)">
THẺ TỪ
</div>

</div>

<div class="label">HÀNH ĐỘNG</div>

<div class="group" id="hanhdong-group">

<div class="btn" onclick="chon('hanhdong','NHẬN',this)">
NHẬN
</div>

<div class="btn" onclick="chon('hanhdong','TRẢ',this)">
TRẢ
</div>

</div>

<div id="so-container"></div>

<div class="label">NGƯỜI DÙNG</div>

<select id="nguoidung">

<option value="">-- Chọn người dùng --</option>

<option>UYÊN 3</option>
<option>TRÍ 4</option>
<option>HOÀNG 3</option>

</select>

<button class="submit" onclick="xacNhan()">
XÁC NHẬN
</button>

<div id="status"></div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz4GR1PGCsWYmxK6iHRCWwa1WiqzcDzs10iiDCugPlPL3guHtPsERh7FAtUyTUaM3Us/exec";

const TARGET_LAT = 10.816551;
const TARGET_LNG = 106.663563;
const MAX_DISTANCE = 50;

let selected = {
thietbi:"",
hanhdong:"",
so:""
};

function chon(type,value,el){

  // bấm lại chính nó => reset
  if(selected[type] === value){

    selected[type] = "";

    if(type === "thietbi"){

      document.getElementById("thietbi-group").innerHTML = `
        <div class="btn" onclick="chon('thietbi','BỘ ĐÀM',this)">
          BỘ ĐÀM
        </div>

        <div class="btn" onclick="chon('thietbi','THẺ TỪ',this)">
          THẺ TỪ
        </div>
      `;

      document.getElementById("so-container").innerHTML="";
      selected.so="";

    }

    if(type === "hanhdong"){

      document.getElementById("hanhdong-group").innerHTML = `
        <div class="btn" onclick="chon('hanhdong','NHẬN',this)">
          NHẬN
        </div>

        <div class="btn" onclick="chon('hanhdong','TRẢ',this)">
          TRẢ
        </div>
      `;
    }

    return;
  }

  selected[type] = value;

  if(type === "thietbi"){

    document.getElementById("thietbi-group").innerHTML =
      `<div class="btn selected"
        onclick="chon('thietbi','${value}',this)">
        ${value}
      </div>`;

    renderSo();
  }

  if(type === "hanhdong"){

    document.getElementById("hanhdong-group").innerHTML =
      `<div class="btn selected"
        onclick="chon('hanhdong','${value}',this)">
        ${value}
      </div>`;
  }

}
function renderSo(){

const box =
document.getElementById("so-container");

let ds=[];

if(selected.thietbi==="BỘ ĐÀM"){
ds=[3,5,6,7,8,9,10,11];
}

if(selected.thietbi==="THẺ TỪ"){
ds=[6,12];
}

let html=
'<div class="label">SỐ THIẾT BỊ</div>';
html+='<div class="group" id="so-group">';

ds.forEach(s=>{

html+=`
<div
class="btn"
onclick="chonSo('${s}',this)">
${s}
</div>
`;

});

html+='</div>';

box.innerHTML=html;

selected.so="";

}

function chonSo(so,el){

  if(selected.so === so){

    selected.so = "";
    renderSo();
    return;
  }

  selected.so = so;

  document.getElementById("so-group").innerHTML =
    `<div class="btn selected"
      onclick="chonSo('${so}',this)">
      ${so}
    </div>`;
}

function xacNhan(){

const nguoidung =
document.getElementById("nguoidung").value;

if(
!selected.thietbi ||
!selected.hanhdong ||
!selected.so ||
!nguoidung
){
show("❌ Chưa nhập đủ");
return;
}

if(selected.hanhdong==="TRẢ"){
checkGPS(nguoidung);
}else{
sendData(nguoidung);
}

}

function checkGPS(nguoidung){

show("📍 Đang kiểm tra GPS...");

navigator.geolocation.getCurrentPosition(

function(pos){

const d =
distance(
pos.coords.latitude,
pos.coords.longitude,
TARGET_LAT,
TARGET_LNG
);

if(d<=MAX_DISTANCE){

sendData(nguoidung);

}else{

show(
"❌ Ngoài phạm vi 50m"
);

}

},

function(){

show("❌ Không lấy được GPS");

},

{
enableHighAccuracy:true
}

);

}

function sendData(nguoidung){

show("Đang gửi...");

fetch(
WEB_APP_URL,
{
method:"POST",
body:JSON.stringify({
thietbi:selected.thietbi,
hanhdong:selected.hanhdong,
so:selected.so,
nguoidung:nguoidung
})
}
)
.then(()=>{

show("✅ Thành công");

setTimeout(()=>{
location.reload();
},1500);

})
.catch(()=>{

show("❌ Lỗi gửi dữ liệu");

});

}

function distance(
lat1,
lon1,
lat2,
lon2
){

const R=6371000;

const dLat=
(lat2-lat1)*Math.PI/180;

const dLon=
(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

function show(msg){

document.getElementById("status").innerText=msg;

}

</script>

</body>
</html>
