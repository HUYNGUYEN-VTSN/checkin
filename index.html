<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GHI NHẬN BỘ ĐÀM / THẺ TỪ</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#edf2f7;
padding:20px;
}

.card{
max-width:520px;
margin:auto;
background:white;
border-radius:24px;
padding:24px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h2{
text-align:center;
color:#1a7f4b;
margin-bottom:25px;
font-size:24px;
}

.label{
margin-top:18px;
margin-bottom:10px;
font-weight:700;
font-size:15px;
color:#c0392b;
}

.group{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.btn{
padding:14px 18px;
border-radius:14px;
border:none;
cursor:pointer;
font-weight:700;
font-size:15px;
transition:.2s;
background:#f1f3f5;
}

.btn:hover{
transform:translateY(-2px);
}

.selected{
background:#1a7f4b;
color:white;
}

select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #d0d7de;
font-size:15px;
background:white;
}

.submit{
width:100%;
margin-top:25px;
padding:16px;
border:none;
border-radius:16px;
background:#1a7f4b;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.submit:hover{
opacity:.9;
}

#status{
margin-top:16px;
text-align:center;
font-weight:bold;
min-height:20px;
}

</style>
</head>

<body>

<div class="card">

<h2>📻 GHI NHẬN BỘ ĐÀM / THẺ TỪ</h2>

<div class="label">THIẾT BỊ</div>

<div class="group" id="thietbi-group">

<div class="btn" onclick="chon('thietbi','BỘ ĐÀM',this)">
BỘ ĐÀM
</div>

<div class="btn" onclick="chon('thietbi','THẺ TỪ',this)">
THẺ TỪ
</div>

</div>

<div class="label">HÀNH ĐỘNG</div>

<div class="group" id="hanhdong-group">

<div class="btn" onclick="chon('hanhdong','NHẬN',this)">
NHẬN
</div>

<div class="btn" onclick="chon('hanhdong','TRẢ',this)">
TRẢ
</div>

</div>

<div id="so-container"></div>

<div class="label">NGƯỜI DÙNG</div>

<select id="nguoidung">

<option value="">-- Chọn người dùng --</option>

<option>UYÊN 3</option>
<option>TRÍ 4</option>
<option>HOÀNG 3</option>

</select>

<button class="submit" onclick="xacNhan()">
XÁC NHẬN
</button>

<div id="status"></div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz4GR1PGCsWYmxK6iHRCWwa1WiqzcDzs10iiDCugPlPL3guHtPsERh7FAtUyTUaM3Us/exec";

const TARGET_LAT = 10.816551;
const TARGET_LNG = 106.663563;
const MAX_DISTANCE = 50;

let selected = {
thietbi:"",
hanhdong:"",
so:""
};

function chon(type,value,el){

selected[type]=value;

const parent = el.parentElement;

parent.innerHTML =
`<div class="btn selected">${value}</div>`;

if(type==="thietbi"){
renderSo();
}

}

function renderSo(){

const box =
document.getElementById("so-container");

let ds=[];

if(selected.thietbi==="BỘ ĐÀM"){
ds=[3,5,6,7,8,9,10,11];
}

if(selected.thietbi==="THẺ TỪ"){
ds=[6,12];
}

let html=
'<div class="label">SỐ THIẾT BỊ</div>';
html+='<div class="group" id="so-group">';

ds.forEach(s=>{

html+=`
<div
class="btn"
onclick="chonSo('${s}',this)">
${s}
</div>
`;

});

html+='</div>';

box.innerHTML=html;

selected.so="";

}

function chonSo(so,el){

selected.so=so;

document.getElementById("so-group").innerHTML=
`<div class="btn selected">${so}</div>`;

}

function xacNhan(){

const nguoidung =
document.getElementById("nguoidung").value;

if(
!selected.thietbi ||
!selected.hanhdong ||
!selected.so ||
!nguoidung
){
show("❌ Chưa nhập đủ");
return;
}

if(selected.hanhdong==="TRẢ"){
checkGPS(nguoidung);
}else{
sendData(nguoidung);
}

}

function checkGPS(nguoidung){

show("📍 Đang kiểm tra GPS...");

navigator.geolocation.getCurrentPosition(

function(pos){

const d =
distance(
pos.coords.latitude,
pos.coords.longitude,
TARGET_LAT,
TARGET_LNG
);

if(d<=MAX_DISTANCE){

sendData(nguoidung);

}else{

show(
"❌ Ngoài phạm vi 50m"
);

}

},

function(){

show("❌ Không lấy được GPS");

},

{
enableHighAccuracy:true
}

);

}

function sendData(nguoidung){

show("Đang gửi...");

fetch(
WEB_APP_URL,
{
method:"POST",
body:JSON.stringify({
thietbi:selected.thietbi,
hanhdong:selected.hanhdong,
so:selected.so,
nguoidung:nguoidung
})
}
)
.then(()=>{

show("✅ Thành công");

setTimeout(()=>{
location.reload();
},1500);

})
.catch(()=>{

show("❌ Lỗi gửi dữ liệu");

});

}

function distance(
lat1,
lon1,
lat2,
lon2
){

const R=6371000;

const dLat=
(lat2-lat1)*Math.PI/180;

const dLon=
(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

function show(msg){

document.getElementById("status").innerText=msg;

}

</script>

</body>
</html>
