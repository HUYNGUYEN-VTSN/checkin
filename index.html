<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GHI NHẬN THIẾT BỊ</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.card{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
cursor:pointer;
}

select{
width:100%;
padding:10px;
margin-top:10px;
}

.status{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h2>GHI NHẬN BỘ ĐÀM / THẺ TỪ</h2>

<p>THIẾT BỊ</p>

<select id="thietbi" onchange="loadDevice()">
<option value="">Chọn</option>
<option value="BỘ ĐÀM">BỘ ĐÀM</option>
<option value="THẺ TỪ">THẺ TỪ</option>
</select>

<p>HÀNH ĐỘNG</p>

<select id="hanhdong">
<option value="">Chọn</option>
<option value="NHẬN">NHẬN</option>
<option value="TRẢ">TRẢ</option>
</select>

<p>SỐ THIẾT BỊ</p>

<select id="so"></select>

<p>NGƯỜI DÙNG</p>

<select id="nguoidung">

<option value="">Chọn người dùng</option>

<option>UYÊN 3</option>
<option>TRÍ 4</option>
<option>HOÀNG 3</option>

</select>

<button onclick="submitData()">
XÁC NHẬN
</button>

<div id="status" class="status"></div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfyjm5E2wzFxWc559ZgXgdYFb6S16Gj52pn-ETCWKBANWb-negT1a0UqJOnpDdlE_L/exec";

const TARGET_LAT = 10.816551;
const TARGET_LNG = 106.663563;

const MAX_DISTANCE = 50;

function loadDevice(){

const tb = document.getElementById("thietbi").value;

const so = document.getElementById("so");

so.innerHTML="";

let list=[];

if(tb==="BỘ ĐÀM"){
list=["3","5","6","7","8","9","10","11"];
}

if(tb==="THẺ TỪ"){
list=["6","12"];
}

list.forEach(x=>{
let op=document.createElement("option");
op.value=x;
op.text=x;
so.appendChild(op);
});

}

function submitData(){

const thietbi =
document.getElementById("thietbi").value;

const hanhdong =
document.getElementById("hanhdong").value;

const so =
document.getElementById("so").value;

const nguoidung =
document.getElementById("nguoidung").value;

if(!thietbi || !hanhdong || !so || !nguoidung){

show("Vui lòng nhập đủ thông tin");
return;

}

if(hanhdong==="TRẢ"){

checkGPS(
thietbi,
hanhdong,
so,
nguoidung
);

}else{

sendData(
thietbi,
hanhdong,
so,
nguoidung
);

}

}

function checkGPS(
thietbi,
hanhdong,
so,
nguoidung
){

navigator.geolocation.getCurrentPosition(

function(pos){

const d =
distance(
pos.coords.latitude,
pos.coords.longitude,
TARGET_LAT,
TARGET_LNG
);

if(d<=50){

sendData(
thietbi,
hanhdong,
so,
nguoidung
);

}else{

show(
"Bạn cách vị trí "
+
Math.round(d)
+
"m"
);

}

},

function(){

show("Không lấy được GPS");

},

{
enableHighAccuracy:true
}

);

}

function sendData(
thietbi,
hanhdong,
so,
nguoidung
){

show("Đang gửi...");

fetch(
WEB_APP_URL,
{
method:"POST",
body:JSON.stringify({
thietbi,
hanhdong,
so,
nguoidung
})
}
)
.then(()=>{

show("✅ Thành công");

setTimeout(()=>{
location.reload();
},1500);

})
.catch(()=>{

show("❌ Lỗi gửi dữ liệu");

});

}

function distance(
lat1,
lon1,
lat2,
lon2
){

const R=6371000;

const dLat=
(lat2-lat1)*Math.PI/180;

const dLon=
(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

function show(msg){

document.getElementById("status").innerText=msg;

}

</script>

</body>
</html>
