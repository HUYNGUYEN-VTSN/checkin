<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BỘ ĐÀM / THẺ TỪ</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(
    135deg,
    #eef7f1 0%,
    #f7fafc 100%
  );
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:20px;
  padding-top:25px; 
}

.card{
  width:100%;
  max-width:540px;
  background:white;
  border-radius:28px;
  padding:28px;
  box-shadow:
    0 25px 50px rgba(0,0,0,.08),
    0 10px 20px rgba(0,0,0,.05);
}
  
.card::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
height:6px;
background:
linear-gradient(
90deg,
#1a7f4b,
#2ecc71
);
}

h2{
text-align:center;
font-size:30px;
font-weight:800;
color:#1a7f4b;
margin-bottom:8px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#718096;
margin-bottom:24px;
}

.label{
margin-top:22px;
margin-bottom:12px;
font-weight:800;
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
color:#c0392b;
position:relative;
padding-left:12px;
}

.label::before{
content:"";
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
width:4px;
height:16px;
border-radius:4px;
background:linear-gradient(#1a7f4b,#23a55a);
}

.group{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.btn{
min-width:110px;
padding:14px 20px;
border-radius:999px;
background:#f8fafc;
border:2px solid #e2e8f0;
font-size:15px;
font-weight:700;
text-align:center;
cursor:pointer;
transition:.25s;
user-select:none;
}

.btn:hover{
transform:translateY(-2px);
border-color:#1a7f4b;
}

.btn:active{
transform:scale(.96);
}

.selected{
background:
linear-gradient(
135deg,
#1a7f4b,
#27ae60
);
color:white;
border-color:#1a7f4b;
box-shadow:
0 10px 20px rgba(26,127,75,.25);
}

#so-container{
margin-top:6px;
}

select{
width:100%;
padding:16px 18px;
border-radius:18px;
border:2px solid #e2e8f0;
font-size:15px;
font-weight:600;
background:#f8fafc;
outline:none;
transition:.25s;
cursor:pointer;
color:#2d3748;
}
select:hover{
border-color:#23a55a;
background:#ffffff;
}
  
select:focus{
border-color:#23a55a;
background:#ffffff;
box-shadow:
0 0 0 5px rgba(35,165,90,.15);
}

.submit{
width:100%;
margin-top:28px;
padding:18px;
border:none;
border-radius:18px;
background:
linear-gradient(
135deg,
#1a7f4b,
#27ae60
);
color:white;
font-size:17px;
font-weight:800;
letter-spacing:1px;
cursor:pointer;
transition:.25s;
box-shadow:
0 12px 25px rgba(26,127,75,.25);
}

.submit:hover{
transform:translateY(-2px);
}

.submit:active{
transform:scale(.98);
}

#status{
margin-top:18px;
text-align:center;
font-size:15px;
font-weight:700;
min-height:22px;
}

.success{
color:#16a34a;
}

.error{
color:#dc2626;
}
.selected-bodam{
background:linear-gradient(
135deg,
#3498db,
#5dade2
);
color:white;
}

.selected-thetu{
background:linear-gradient(
135deg,
#8e44ad,
#bb6bd9
);
color:white;
}

.selected-nhan{
background:linear-gradient(
135deg,
#1a7f4b,
#23a55a
);
color:white;
}

.selected-tra{
background:linear-gradient(
135deg,
#e74c3c,
#ff6b6b
);
color:white;
}

.selected-so{
background:linear-gradient(
135deg,
#f39c12,
#f7b731
);
color:white;
}

  .fake-options{
display:none;
flex-direction:column;
gap:8px;
margin-top:10px;
}

.fake-options input{
padding:12px 14px;
border-radius:14px;
border:2px solid #e2e8f0;
outline:none;
font-size:14px;
font-weight:600;
}
  
.user-item{
padding:12px 14px;
border-radius:14px;
background:#f8fafc;
border:2px solid #e2e8f0;
cursor:pointer;
font-weight:700;
transition:.2s;
}

.user-item:hover{
background:#e8f5e9;
border-color:#1a7f4b;
transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="card">

<h2>
📻 BỘ ĐÀM / THẺ TỪ
</h2>

<div class="label">THIẾT BỊ</div>

<div class="group" id="thietbi-group">

<div class="btn" onclick="chon('thietbi','BỘ ĐÀM',this)">
BỘ ĐÀM
</div>

<div class="btn" onclick="chon('thietbi','THẺ TỪ',this)">
THẺ TỪ
</div>

</div>

<div class="label">HÀNH ĐỘNG</div>

<div class="group" id="hanhdong-group">

<div class="btn" onclick="chon('hanhdong','NHẬN',this)">
NHẬN
</div>

<div class="btn" onclick="chon('hanhdong','TRẢ',this)">
TRẢ
</div>

</div>

<div id="so-container"></div>

<div class="label">NGƯỜI DÙNG</div>
<div class="fake-select">
<div class="fake-selected" onclick="toggleUser()">
    👤 Chọn người dùng
  </div>

  <div class="fake-options" id="user-options">

    <!-- SEARCH BOX -->
    <input 
      type="text" 
      id="user-search" 
      placeholder="🔎 Tìm tên..."
      oninput="filterUser()"
    />
    <!-- LIST -->
    <div class="user-item" onclick="chonUser('UYÊN 3')">UYÊN 3</div>
    <div class="user-item" onclick="chonUser('TRÍ 4')">TRÍ 4</div>
    <div class="user-item" onclick="chonUser('HOÀNG 3')">HOÀNG 3</div>
 </div>
</div>

<button class="submit" onclick="xacNhan()">
XÁC NHẬN
</button>

<div id="status"></div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz4GR1PGCsWYmxK6iHRCWwa1WiqzcDzs10iiDCugPlPL3guHtPsERh7FAtUyTUaM3Us/exec";

const TARGET_LAT = 10.816357;
const TARGET_LNG = 106.663301;
const MAX_DISTANCE = 50;

let selected = {
thietbi:"",
hanhdong:"",
so:""
};

function chon(type,value,el){

  // bấm lại chính nó => reset
  if(selected[type] === value){

    selected[type] = "";

    if(type === "thietbi"){

      document.getElementById("thietbi-group").innerHTML = `
        <div class="btn" onclick="chon('thietbi','BỘ ĐÀM',this)">
          BỘ ĐÀM
        </div>

        <div class="btn" onclick="chon('thietbi','THẺ TỪ',this)">
          THẺ TỪ
        </div>
      `;

      document.getElementById("so-container").innerHTML="";
      selected.so="";

    }

    if(type === "hanhdong"){

      document.getElementById("hanhdong-group").innerHTML = `
        <div class="btn" onclick="chon('hanhdong','NHẬN',this)">
          NHẬN
        </div>

        <div class="btn" onclick="chon('hanhdong','TRẢ',this)">
          TRẢ
        </div>
      `;
    }

    return;
  }

  selected[type] = value;

  if(type === "thietbi"){

const colorClass =
  value==="BỘ ĐÀM"
  ? "selected-bodam"
  : "selected-thetu";

document.getElementById("thietbi-group").innerHTML =
  `<div class="btn ${colorClass}"
    onclick="chon('thietbi','${value}',this)">
    ${value}
  </div>`;

    renderSo();
  }

  if(type === "hanhdong"){

const colorClass =
  value==="NHẬN"
  ? "selected-nhan"
  : "selected-tra";

document.getElementById("hanhdong-group").innerHTML =
  `<div class="btn ${colorClass}"
    onclick="chon('hanhdong','${value}',this)">
    ${value}
  </div>`;
  }

}
function renderSo(){

const box =
document.getElementById("so-container");

let ds=[];

if(selected.thietbi==="BỘ ĐÀM"){
ds=[3,5,6,7,8,9,10,11];
}

if(selected.thietbi==="THẺ TỪ"){
ds=[6,12];
}

let html=
'<div class="label">SỐ THIẾT BỊ</div>';
html+='<div class="group" id="so-group">';

ds.forEach(s=>{

html+=`
<div
class="btn"
onclick="chonSo('${s}',this)">
${s}
</div>
`;

});

html+='</div>';

box.innerHTML=html;

selected.so="";

}

function chonSo(so,el){

  if(selected.so === so){

    selected.so = "";
    renderSo();
    return;
  }

  selected.so = so;

document.getElementById("so-group").innerHTML =
  `<div class="btn selected-so"
    onclick="chonSo('${so}',this)">
    ${so}
  </div>`;
}

function xacNhan(){

  const nguoidung = selectedUser;

  if(
    !selected.thietbi ||
    !selected.hanhdong ||
    !selected.so ||
    !nguoidung
  ){
    show("❌ Chưa nhập đủ thông tin");
    return;
  }

  if(selected.hanhdong === "TRẢ"){
    checkGPS(nguoidung);
  } else {
    sendData(nguoidung);
  }
}

}

function checkGPS(nguoidung){

show("📍 Đang kiểm tra GPS...");

navigator.geolocation.getCurrentPosition(

function(pos){

const d =
distance(
pos.coords.latitude,
pos.coords.longitude,
TARGET_LAT,
TARGET_LNG
);

if(d<=MAX_DISTANCE){

sendData(nguoidung);

}else{

show(
"❌ Ngoài phạm vi phòng đội"
);

}

},

function(){

show("❌ Không lấy được GPS");

},

{
enableHighAccuracy:true
}

);

}

function sendData(nguoidung){

  show("Đang gửi...");

  fetch(WEB_APP_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      thietbi: selected.thietbi,
      hanhdong: selected.hanhdong,
      so: selected.so,
      nguoidung: nguoidung
    })
  })
  .then(()=>{

    show("✅ Thành công");

    setTimeout(()=>{
      location.reload();
    },1500);

  })
  .catch(()=>{
    show("❌ Lỗi gửi dữ liệu");
  });

}

function distance(
lat1,
lon1,
lat2,
lon2
){

const R=6371000;

const dLat=
(lat2-lat1)*Math.PI/180;

const dLon=
(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

function show(msg){

document.getElementById("status").innerText=msg;

}

let selectedUser = "";

function toggleUser(){
  const box = document.getElementById("user-options");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function chonUser(name){
  selectedUser = name;

  document.querySelector(".fake-selected").innerHTML =
    "👤 " + name;

  document.getElementById("user-options").style.display = "none";
}

function filterUser(){
  const input = document.getElementById("user-search").value.toLowerCase();
  const items = document.querySelectorAll(".user-item");

  items.forEach(item => {
    const text = item.textContent.toLowerCase();

    if(text.includes(input)){
      item.style.display = "block";
    } else {
      item.style.display = "none";
    }
  });
}
  
</script>

</body>
</html>
