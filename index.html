<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz4GR1PGCsWYmxK6iHRCWwa1WiqzcDzs10iiDCugPlPL3guHtPsERh7FAtUyTUaM3Us/exec";

const TARGET_LAT = 10.816551;
const TARGET_LNG = 106.663563;
const MAX_DISTANCE = 50;

let selected = {
thietbi:"",
hanhdong:"",
so:""
};

function chon(type,value,el){

  // bấm lại chính nó => reset
  if(selected[type] === value){

    selected[type] = "";

    if(type === "thietbi"){

      document.getElementById("thietbi-group").innerHTML = `
        <div class="btn" onclick="chon('thietbi','BỘ ĐÀM',this)">
          BỘ ĐÀM
        </div>

        <div class="btn" onclick="chon('thietbi','THẺ TỪ',this)">
          THẺ TỪ
        </div>
      `;

      document.getElementById("so-container").innerHTML="";
      selected.so="";

    }

    if(type === "hanhdong"){

      document.getElementById("hanhdong-group").innerHTML = `
        <div class="btn" onclick="chon('hanhdong','NHẬN',this)">
          NHẬN
        </div>

        <div class="btn" onclick="chon('hanhdong','TRẢ',this)">
          TRẢ
        </div>
      `;
    }

    return;
  }

  selected[type] = value;

  if(type === "thietbi"){

const colorClass =
  value==="BỘ ĐÀM"
  ? "selected-bodam"
  : "selected-thetu";

document.getElementById("thietbi-group").innerHTML =
  `<div class="btn ${colorClass}"
    onclick="chon('thietbi','${value}',this)">
    ${value}
  </div>`;

    renderSo();
  }

  if(type === "hanhdong"){

const colorClass =
  value==="NHẬN"
  ? "selected-nhan"
  : "selected-tra";

document.getElementById("hanhdong-group").innerHTML =
  `<div class="btn ${colorClass}"
    onclick="chon('hanhdong','${value}',this)">
    ${value}
  </div>`;
  }

}
function renderSo(){

const box =
document.getElementById("so-container");

let ds=[];

if(selected.thietbi==="BỘ ĐÀM"){
ds=[3,5,6,7,8,9,10,11];
}

if(selected.thietbi==="THẺ TỪ"){
ds=[6,12];
}

let html=
'<div class="label">SỐ THIẾT BỊ</div>';
html+='<div class="group" id="so-group">';

ds.forEach(s=>{

html+=`
<div
class="btn"
onclick="chonSo('${s}',this)">
${s}
</div>
`;

});

html+='</div>';

box.innerHTML=html;

selected.so="";

}

function chonSo(so,el){

  if(selected.so === so){

    selected.so = "";
    renderSo();
    return;
  }

  selected.so = so;

document.getElementById("so-group").innerHTML =
  `<div class="btn selected-so"
    onclick="chonSo('${so}',this)">
    ${so}
  </div>`;
}

function xacNhan(){

const nguoidung =
document.getElementById("nguoidung").value;

if(
!selected.thietbi ||
!selected.hanhdong ||
!selected.so ||
!nguoidung
){
show("❌ Chưa nhập đủ");
return;
}

if(selected.hanhdong==="TRẢ"){
checkGPS(nguoidung);
}else{
sendData(nguoidung);
}

}

function checkGPS(nguoidung){

show("📍 Đang kiểm tra GPS...");

navigator.geolocation.getCurrentPosition(

function(pos){

const d =
distance(
pos.coords.latitude,
pos.coords.longitude,
TARGET_LAT,
TARGET_LNG
);

if(d<=MAX_DISTANCE){

sendData(nguoidung);

}else{

show(
"❌ Ngoài phạm vi 50m"
);

}

},

function(){

show("❌ Không lấy được GPS");

},

{
enableHighAccuracy:true
}

);

}

function sendData(nguoidung){

show("Đang gửi...");

fetch(
WEB_APP_URL,
{
method:"POST",
body:JSON.stringify({
thietbi:selected.thietbi,
hanhdong:selected.hanhdong,
so:selected.so,
nguoidung:nguoidung
})
}
)
.then(()=>{

show("✅ Thành công");

setTimeout(()=>{
location.reload();
},1500);

})
.catch(()=>{

show("❌ Lỗi gửi dữ liệu");

});

}

function distance(
lat1,
lon1,
lat2,
lon2
){

const R=6371000;

const dLat=
(lat2-lat1)*Math.PI/180;

const dLon=
(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

function show(msg){

document.getElementById("status").innerText=msg;

}
