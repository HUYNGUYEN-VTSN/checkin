<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GHI NHẬN BỘ ĐÀM / THẺ TỪ</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

.label{
font-weight:bold;
margin-top:15px;
margin-bottom:8px;
}

.group{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.btn{
padding:10px 15px;
border:1px solid #ccc;
border-radius:10px;
cursor:pointer;
background:white;
}

.selected{
background:#28a745;
color:white;
border-color:#28a745;
}

select{
width:100%;
padding:10px;
border-radius:10px;
}

.submit{
width:100%;
margin-top:20px;
padding:14px;
border:none;
background:#28a745;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h2>📻 GHI NHẬN BỘ ĐÀM / THẺ TỪ</h2>

<div class="label">THIẾT BỊ</div>

<div class="group" id="thietbi-group">

<div class="btn" onclick="chon('thietbi','BỘ ĐÀM',this)">
BỘ ĐÀM
</div>

<div class="btn" onclick="chon('thietbi','THẺ TỪ',this)">
THẺ TỪ
</div>

</div>

<div class="label">HÀNH ĐỘNG</div>

<div class="group" id="hanhdong-group">

<div class="btn" onclick="chon('hanhdong','NHẬN',this)">
NHẬN
</div>

<div class="btn" onclick="chon('hanhdong','TRẢ',this)">
TRẢ
</div>

</div>

<div id="so-container"></div>

<div class="label">NGƯỜI DÙNG</div>

<select id="nguoidung">

<option value="">-- Chọn người dùng --</option>

<option>UYÊN 3</option>
<option>TRÍ 4</option>
<option>HOÀNG 3</option>

</select>

<button class="submit" onclick="xacNhan()">
XÁC NHẬN
</button>

<div id="status"></div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz4GR1PGCsWYmxK6iHRCWwa1WiqzcDzs10iiDCugPlPL3guHtPsERh7FAtUyTUaM3Us/exec";

const TARGET_LAT = 10.816551;
const TARGET_LNG = 106.663563;
const MAX_DISTANCE = 50;

let selected = {
thietbi:"",
hanhdong:"",
so:""
};

function chon(type,value,el){

document
.querySelectorAll(
"#"+type+"-group .btn"
)
.forEach(x=>x.classList.remove("selected"));

el.classList.add("selected");

selected[type]=value;

if(type==="thietbi"){
renderSo();
}

}

function renderSo(){

const box =
document.getElementById("so-container");

let html =
'<div class="label">SỐ THIẾT BỊ</div>';
html += '<div class="group" id="so-group">';

let ds=[];

if(selected.thietbi==="BỘ ĐÀM"){
ds=[3,5,6,7,8,9,10,11];
}

if(selected.thietbi==="THẺ TỪ"){
ds=[6,12];
}

ds.forEach(s=>{

html += `
<div class="btn"
onclick="chonSo('${s}',this)">
${s}
</div>
`;

});

html += "</div>";

box.innerHTML = html;

selected.so="";

}

function chonSo(so,el){

document
.querySelectorAll("#so-group .btn")
.forEach(x=>x.classList.remove("selected"));

el.classList.add("selected");

selected.so=so;

}

function xacNhan(){

const nguoidung =
document.getElementById("nguoidung").value;

if(
!selected.thietbi ||
!selected.hanhdong ||
!selected.so ||
!nguoidung
){
show("❌ Chưa nhập đủ");
return;
}

if(selected.hanhdong==="TRẢ"){
checkGPS(nguoidung);
}else{
sendData(nguoidung);
}

}

function checkGPS(nguoidung){

show("📍 Đang kiểm tra GPS...");

navigator.geolocation.getCurrentPosition(

function(pos){

const d =
distance(
pos.coords.latitude,
pos.coords.longitude,
TARGET_LAT,
TARGET_LNG
);

if(d<=MAX_DISTANCE){

sendData(nguoidung);

}else{

show(
"❌ Ngoài phạm vi 50m"
);

}

},

function(){

show("❌ Không lấy được GPS");

},

{
enableHighAccuracy:true
}

);

}

function sendData(nguoidung){

show("Đang gửi...");

fetch(
WEB_APP_URL,
{
method:"POST",
body:JSON.stringify({
thietbi:selected.thietbi,
hanhdong:selected.hanhdong,
so:selected.so,
nguoidung:nguoidung
})
}
)
.then(()=>{

show("✅ Thành công");

setTimeout(()=>{
location.reload();
},1500);

})
.catch(()=>{

show("❌ Lỗi gửi dữ liệu");

});

}

function distance(
lat1,
lon1,
lat2,
lon2
){

const R=6371000;

const dLat=
(lat2-lat1)*Math.PI/180;

const dLon=
(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

function show(msg){

document.getElementById("status").innerText=msg;

}

</script>

</body>
</html>
