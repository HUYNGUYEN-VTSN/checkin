.card::before{

linear-gradient(
90deg,

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbwquuOMANFuL7naFH2ThRUqDHd4eiVd6VTLV35UdfeP2PEfEN1-Jn2oZksNFp5xbqTr/exec";

const TARGET_LAT = 10.816357;
const TARGET_LNG = 106.663301;
const MAX_DISTANCE = 50;

let selected = {
thietbi:"",
hanhdong:"",
so:""
};

// ===== Tìm kiếm tên người dùng =====

const userSelectEl = document.getElementById("nguoidung");
const userInputEl = document.getElementById("user-search-input");
const userDropdownEl = document.getElementById("user-dropdown");

// Lấy danh sách tên từ <select> gốc (bỏ option rỗng đầu tiên)
const danhSachNguoiDung = Array.from(userSelectEl.options)
  .map(o => o.value)
  .filter(v => v !== "");

let userActiveIndex = -1;
let userFilteredList = [];

function highlightMatch(text, query){
  if(!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if(idx === -1) return text;
  return (
    text.slice(0,idx) +
    "<mark>" + text.slice(idx, idx+query.length) + "</mark>" +
    text.slice(idx+query.length)
  );
}

function renderUserDropdown(query){

  const q = query.trim().toLowerCase();

  userFilteredList = q === ""
    ? danhSachNguoiDung
    : danhSachNguoiDung.filter(name => name.toLowerCase().includes(q));

  userActiveIndex = -1;

  if(userFilteredList.length === 0){
    userDropdownEl.innerHTML =
      '<div class="user-option-empty">Không tìm thấy tên nào</div>';
  }else{
    userDropdownEl.innerHTML = userFilteredList.map((name,i)=>
      `<div class="user-option" data-index="${i}" onclick="chonNguoiDung('${name.replace(/'/g,"\\'")}')">${highlightMatch(name,query)}</div>`
    ).join("");
  }

  userDropdownEl.classList.add("open");
}

function chonNguoiDung(name){
  userSelectEl.value = name;
  userInputEl.value = name;
  userInputEl.classList.add("has-value");
  userDropdownEl.classList.remove("open");
}

userInputEl.addEventListener("input", function(){
  // Gõ lại nghĩa là chưa chắc tên đã chọn còn đúng, xóa value cũ
  userSelectEl.value = "";
  userInputEl.classList.remove("has-value");
  renderUserDropdown(userInputEl.value);
});

userInputEl.addEventListener("focus", function(){
  renderUserDropdown(userInputEl.value);
});

userInputEl.addEventListener("blur", function(){
  // Để kịp xử lý click chọn item trước khi đóng dropdown
  setTimeout(()=>{
    userDropdownEl.classList.remove("open");
    // Nếu rời khỏi ô mà chưa chọn tên hợp lệ nào, xóa trắng để tránh nhầm
    if(userSelectEl.value === ""){
      userInputEl.value = "";
    }
  },150);
});

userInputEl.addEventListener("keydown", function(e){

  if(!userDropdownEl.classList.contains("open")) return;

  const items = userDropdownEl.querySelectorAll(".user-option");
  if(items.length === 0) return;

  if(e.key === "ArrowDown"){
    e.preventDefault();
    userActiveIndex = Math.min(userActiveIndex+1, items.length-1);
    updateActiveItem(items);
  }else if(e.key === "ArrowUp"){
    e.preventDefault();
    userActiveIndex = Math.max(userActiveIndex-1, 0);
    updateActiveItem(items);
  }else if(e.key === "Enter"){
    e.preventDefault();
    if(userActiveIndex >= 0 && userFilteredList[userActiveIndex]){
      chonNguoiDung(userFilteredList[userActiveIndex]);
    }
  }else if(e.key === "Escape"){
    userDropdownEl.classList.remove("open");
  }

});

function updateActiveItem(items){
  items.forEach((it,i)=>{
    it.classList.toggle("active", i===userActiveIndex);
  });
  if(items[userActiveIndex]){
    items[userActiveIndex].scrollIntoView({block:"nearest"});
  }
}

        </div>

        </div>
      `;

      if(selected.thietbi){
        renderSo();
      }
    }

    return;
  }

  selected[type] = value;

  if(type === "thietbi"){

const colorClass =

document.getElementById("thietbi-group").innerHTML =

    onclick="chon('thietbi','${value}',this)">

  if(type === "hanhdong"){

const colorClass =
  value==="NHẬN"

document.getElementById("hanhdong-group").innerHTML =

}
// Lưu trạng thái thiết bị đang bị mượn, dạng { "BỘ ĐÀM|3": "TÊN NGƯỜI ĐANG GIỮ", ... }
let trangThaiMuon = {};
let daTaiTrangThaiLanDau = false;

// Lưu toàn bộ data thô (gồm cả "time") để tính list cảnh báo quá 8h
let danhSachThietBiDangMuon = [];

// Chuẩn hóa chuỗi (NFC) để tránh lệch dạng tổ hợp dấu tiếng Việt
// giữa dữ liệu từ Google Sheet và chuỗi viết trong code.
function chuanHoaKey(thietbi, so){
  return (thietbi || "").normalize("NFC") + "|" + so;
}

function renderCanhBaoQua8h(){

  const box = document.getElementById("canhbao-container");
  if(!box) return;

  const NGUONG_GIO = 8;
  const now = Date.now();

  const dsQuaGio = danhSachThietBiDangMuon
    .filter(item => item.time && (now - item.time) / (1000*60*60) >= NGUONG_GIO)
    .map(item => ({
      ...item,
      soGio: (now - item.time) / (1000*60*60)
    }))
    .sort((a,b) => b.soGio - a.soGio);

  if(dsQuaGio.length === 0){
    box.innerHTML = "";
    return;
  }

  let html = '<div class="canhbao-title">⚠️ Thiết bị giữ quá 8 tiếng, vui lòng TRẢ hoặc NHẬN mới nếu tiếp tục sử dụng</div>';
  html += '<div class="canhbao-list">';

  dsQuaGio.forEach(item => {
    html += `
      <div class="canhbao-item">
        <span class="canhbao-ten">${item.nguoidung}</span>
        <span class="canhbao-thietbi">${item.thietbi} ${item.so}</span>
        <span class="canhbao-gio">${item.soGio.toFixed(1)}h</span>
      </div>
    `;
  });

  html += '</div>';
  box.innerHTML = html;

}

function capNhatTrangThai(){

  fetch(WEB_APP_URL, {
    method:"POST",
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },
    body:JSON.stringify({ action:"trangthai" })
  })
    .then(function(res){
      if(!res.ok) throw new Error("HTTP "+res.status);
      return res.json();
    })
    .then(function(json){

      daTaiTrangThaiLanDau = true;

      if(!json || json.success !== true){
        if(selected.thietbi) renderSo();
        return;
      }

      const moi = {};

      (json.data || []).forEach(function(item){
        const key = chuanHoaKey(item.thietbi, item.so);
        moi[key] = item.nguoidung || "Đang mượn";
      });

      trangThaiMuon = moi;
      danhSachThietBiDangMuon = json.data || [];

      renderCanhBaoQua8h();

      // Vẽ lại danh sách số nếu đang hiển thị, để áp dụng trạng thái mới
      if(selected.thietbi){
        renderSo();
      }

    })
    .catch(function(){
      // Im lặng bỏ qua nếu lỗi mạng tạm thời, không làm phiền người dùng
      // vì đây chỉ là cập nhật nền, không phải hành động chính
      daTaiTrangThaiLanDau = true; // coi như đã thử xong, tránh kẹt mãi ở trạng thái chờ
      if(selected.thietbi) renderSo();
    });

}

// Lấy trạng thái lần đầu khi mở trang, sau đó tự lặp lại mỗi 30 giây
capNhatTrangThai();
setInterval(capNhatTrangThai, 30000);

function renderSo(){

const box =
document.getElementById("so-container");

let ds=[];

if(selected.thietbi==="BỘ ĐÀM"){
ds=[3,4,5,7,8,9,10,11];
}

if(selected.thietbi==="THẺ TỪ"){
ds=[5,16,"IPAD"];
}

let html=
'<div class="label">SỐ THIẾT BỊ</div>';

if(!daTaiTrangThaiLanDau){
html+='<div style="text-align:center;font-size:13px;color:#a0aec0;margin-bottom:10px;">⏳ Đang tải thông tin người đang giữ...</div>';
}

html+='<div class="group" id="so-group">';

ds.forEach(s=>{

const key = chuanHoaKey(selected.thietbi, s);
const nguoiDangGiu = trangThaiMuon[key];

if(nguoiDangGiu){

html+=`
<div
class="btn btn-co-nguoi-giu"
onclick="chonSo('${s}',this)">
${s}
<span class="nguoi-giu">${nguoiDangGiu}</span>
</div>
`;

}else{

html+=`
<div
class="btn"
onclick="chonSo('${s}',this)">
${s}
</div>
`;

}

});

html+='</div>';

box.innerHTML=html;

selected.so="";

}

function chonSo(so,el){

  if(selected.so === so){

    selected.so = "";
    renderSo();
    return;
  }

  selected.so = so;

const key = chuanHoaKey(selected.thietbi, so);
const nguoiDangGiu = trangThaiMuon[key];

document.getElementById("so-group").innerHTML =
  `<div class="btn selected-so"
    onclick="chonSo('${so}',this)">
    ${so}
    ${nguoiDangGiu ? `<span class="nguoi-giu">${nguoiDangGiu}</span>` : ""}
  </div>`;
}

function xacNhan(){

const nguoidung =
document.getElementById("nguoidung").value;

if(
!selected.thietbi ||
!selected.hanhdong ||
!selected.so ||
!nguoidung
){
show("❌ Bạn chưa nhập đủ thông tin","error");
return;
}

setSubmitting(true);

if(selected.hanhdong==="TRẢ"){
checkGPS(nguoidung);
}else{
sendData(nguoidung,null,null);
}

}

function checkGPS(nguoidung){

show("📍 Đang kiểm tra GPS...","");

navigator.geolocation.getCurrentPosition(

function(pos){

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

const d = distance(lat,lng,TARGET_LAT,TARGET_LNG);

if(d>MAX_DISTANCE){

show(
"❌ Ngoài phạm vi phòng đội, vui lòng thử lại","error"
);
setSubmitting(false);
return;

}

sendData(nguoidung,lat,lng);

},

function(err){

let msg = "❌ Không lấy được GPS";

if(err && err.code === 1){
  msg = "❌ Bạn chưa cho phép truy cập vị trí";
}else if(err && err.code === 2){
  msg = "❌ Không xác định được vị trí";
}else if(err && err.code === 3){
  msg = "❌ Lấy GPS quá thời gian, thử lại";
}

show(msg,"error");
setSubmitting(false);

},

{
enableHighAccuracy:true,
timeout:15000
}

);

}

function sendData(nguoidung,lat,lng){

show("Đang gửi...","");

const payload = {
thietbi:selected.thietbi,
hanhdong:selected.hanhdong,
so:selected.so,
nguoidung:nguoidung,
lat:lat,
lng:lng
};

fetch(
WEB_APP_URL,
{
method:"POST",
headers:{
"Content-Type":"text/plain;charset=utf-8"
},
body:JSON.stringify(payload)
}
)
.then(function(res){
  if(!res.ok){
    throw new Error("HTTP "+res.status);
  }
  return res.text();
})
.then(function(text){

  let data = null;
  try{ data = JSON.parse(text); }catch(e){}

  if(data && data.success === false){
    show("❌ "+(data.message || "Lỗi từ máy chủ"),"error");
    setSubmitting(false);
    return;
  }

  show("✅ Thành công","success");

  setTimeout(()=>{
  location.reload();
  },1500);

})
.catch(()=>{

show("❌ Lỗi gửi dữ liệu, kiểm tra mạng và thử lại","error");
setSubmitting(false);

});

}

function setSubmitting(isSubmitting){
  document.getElementById("submitBtn").disabled = isSubmitting;
}

function distance(
lat1,
lon1,
lat2,
lon2
){

const R=6371000;

const dLat=
(lat2-lat1)*Math.PI/180;

const dLon=
(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

function show(msg,cls){

const el = document.getElementById("status");
el.innerText=msg;
el.className = cls || "";

}

</script>

</html>
